<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta</title>  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#000;
      color:#eaeaea;
      font-family:'Courier New', monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      overflow:hidden;
    }

    .paper {
      background:rgba(255,255,255,0.04);
      border-radius:12px;
      padding:30px 25px;
      max-width:650px;
      width:90%;
      box-shadow:0 0 40px rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
    }

    .typing {
      white-space:pre-line;
      line-height:1.9;
      font-size:16px;
      letter-spacing:0.8px;
      border-right:2px solid #aaa;
      padding-right:5px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%,100% { border-color:#aaa }
      50% { border-color:transparent }
    }

    .fade-out {
      animation: fadeToBlack 4s forwards;
    }

    @keyframes fadeToBlack {
      0% { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.05); }
    }

    #playBtn {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#fff;
      color:#000;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
    }

    @keyframes softFade {
      0% { transform:translate(-50%,-40%) scale(0.9); opacity:0 }
      100% { transform:translate(-50%,-50%) scale(1); opacity:1 }
    }

    @keyframes float {
      0%,100% { transform:translate(-50%,-50%) translateY(0) }
      50% { transform:translate(-50%,-50%) translateY(-10px) }
    }
  </style></head>
<body><div class="paper">
  <div id="text" class="typing"></div>
</div><audio id="bg-music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio><button onclick="tocarMusica()" id="playBtn">▶️ Tocar música</button>

<script>
function tocarMusica(){
  const music=document.getElementById("bg-music");
  music.play();
  document.getElementById("playBtn").style.display="none";
}

const texto=`PARA VOCÊ, MINHA PESSOA

Você é o amor da minha vida
e o amor que dá sentido à minha vida.
Meu porto seguro,
meu sorriso mais verdadeiro,
a felicidade que chega todos os dias sem esforço.

Você foi sonho antes de ser realidade,
e hoje é presença, é casa, é certeza.
Sou feliz porque te amo
e porque escolhi te querer ao meu lado,
hoje, amanhã, sempre.

Eu me apaixono por você nos detalhes,
no jeito simples de existir,
na pureza do seu coração
e na forma bonita com que você ama.

Agradeço a Deus por nós,
pela nossa simplicidade,
pela amizade que sustenta,
pelo amor que cresce tranquilo.

Você é a pessoa mais incrível que conheci.
E amar você
é a escolha mais bonita que o meu coração já fez.`;

let i=0;
const el=document.getElementById("text");

function escrever(){
  if(i<texto.length){
    const char=texto.charAt(i);
    el.innerHTML+=char;
    i++;

    let delay=55+Math.random()*120;
    if(char===','||char==='.') delay+=200;
    if(char==='\n') delay+=300;
    if(Math.random()<0.05) delay+=300;

    setTimeout(escrever,delay);
  } else {
    mostrarFinal();
  }
}

function mostrarFinal(){
  document.querySelector('.paper').classList.add('fade-out');

  setTimeout(()=>{
    const finalMsg=document.createElement("div");
    finalMsg.innerText="EU TE AMO CALAIOOO 💖";

    finalMsg.style.position="fixed";
    finalMsg.style.top="50%";
    finalMsg.style.left="50%";
    finalMsg.style.fontSize="26px";
    finalMsg.style.textAlign="center";
    finalMsg.style.letterSpacing="2px";
    finalMsg.style.animation="softFade 1.2s ease forwards, float 2s ease-in-out infinite 1.2s";

    document.body.appendChild(finalMsg);
  },4000);
}

escrever();
</script></body>
</html>
